# Phase A training configuration for LandmarkDiff
# Synthetic pairs only, diffusion loss only (no identity/perceptual)
# Usage: python scripts/train_controlnet.py --config configs/phaseA.yaml

experiment_name: phaseA_v1
description: Phase A ControlNet training on synthetic TPS pairs
version: "0.3.0"

training:
  phase: A
  learning_rate: 1.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 50000
  warmup_steps: 500
  mixed_precision: bf16
  ema_decay: 0.9999
  max_grad_norm: 1.0
  save_interval: 2500
  log_interval: 100
  sample_interval: 1000

  # Loss weights (Phase A: diffusion only)
  loss_weights:
    diffusion: 1.0
    identity: 0.0
    perceptual: 0.0
    mask: 0.0

  # Optimizer
  optimizer: adamw
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 0.01

  # Scheduler
  lr_scheduler: cosine
  lr_warmup_steps: 500

data:
  train_dir: data/training_combined
  image_size: 512
  num_workers: 4
  clinical_augment: false
  geometric_augment: true

inference:
  num_inference_steps: 30
  guidance_scale: 7.5
  scheduler: dpmsolver++
  controlnet_conditioning_scale: 1.0

safety:
  identity_threshold: 0.6
  max_displacement_fraction: 0.05
  watermark_enabled: false

output_dir: checkpoints/phaseA

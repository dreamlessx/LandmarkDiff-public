# Quick Phase A config for debugging / smoke testing
# Uses smaller batch and fewer steps
experiment_name: "phaseA_quick_test"

model:
  base_model: "runwayml/stable-diffusion-v1-5"
  ema_decay: 0.9999

training:
  phase: "A"
  learning_rate: 1.0e-5
  batch_size: 2
  gradient_accumulation_steps: 2
  max_train_steps: 500
  lr_scheduler: "cosine"
  mixed_precision: "bf16"
  seed: 42
  save_every_n_steps: 250
  validate_every_n_steps: 100
  num_validation_samples: 2

data:
  train_dir: "data/training_combined"
  val_dir: "data/splits/val"
  image_size: 512
  num_workers: 4

wandb:
  enabled: false

output_dir: "outputs/phaseA_quick_test"

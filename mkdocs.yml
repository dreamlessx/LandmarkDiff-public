site_name: LandmarkDiff
site_description: Photorealistic facial surgery outcome prediction from a single photo, powered by anatomically-conditioned latent diffusion.
site_url: https://dreamlessx.github.io/LandmarkDiff-public
repo_url: https://github.com/dreamlessx/LandmarkDiff-public
repo_name: dreamlessx/LandmarkDiff-public

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
    - Installation: install.md
    - Quick Start: tutorials/quickstart.md
    - FAQ: faq.md
  - Tutorials:
    - Custom Procedures: tutorials/custom_procedures.md
    - Training: tutorials/training.md
    - Evaluation: tutorials/evaluation.md
    - Deployment: tutorials/deployment.md
  - API Reference:
    - Landmarks: api/landmarks.md
    - Manipulation: api/manipulation.md
    - Conditioning: api/conditioning.md
    - Inference: api/inference.md
    - Evaluation: api/evaluation.md
    - Clinical: api/clinical.md
  - Model Zoo: model_zoo.md
  - Benchmarks: benchmarks.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dreamlessx/LandmarkDiff-public
    - icon: fontawesome/solid/rocket
      link: https://huggingface.co/spaces/dreamlessx/LandmarkDiff
      name: Live Demo on Hugging Face

name: Initialize Wiki
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create wiki pages
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use PAT if available, otherwise GITHUB_TOKEN
          TOKEN="${WIKI_TOKEN:-${GH_TOKEN}}"
          
          mkdir -p wiki-dir
          cd wiki-dir
          git init
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.wiki.git"
          
          # Copy wiki pages
          cp ../docs/wiki/*.md .
          
          git config user.name "dreamlessx"
          git config user.email "dreamlessx@users.noreply.github.com"
          git add -A
          git commit -m "add comprehensive wiki documentation"
          git branch -M master
          git push -u origin master --force

name: Build Paper

on:
  push:
    paths:
      - 'paper/**'
  pull_request:
    paths:
      - 'paper/**'

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra
      - name: Build paper
        run: cd paper && make
      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: paper-pdf
          path: paper/main.pdf

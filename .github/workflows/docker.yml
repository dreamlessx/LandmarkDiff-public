name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.cpu'
      - 'docker-compose.yml'

jobs:
  build-gpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: landmarkdiff:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cpu
          push: false
          tags: landmarkdiff:cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
